services:
  php:
    build: .  # 使用当前目录的 Dockerfile 构建镜像，而不是直接用官方镜像
    container_name: car_php
    volumes:
      - ./houtai:/var/www/html
    # 不需要在这里指定 working_dir，除非你有特殊脚本需求
    # 如果需要自动安装依赖，可以取消下面注释
    # command: sh -c "composer install && php-fpm" 

  mysql:
    # 将 5.7 改为 8.0 (或者直接用 latest)
    image: mysql:8.0 
    container_name: tp_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
      # MySQL 8.0 默认密码插件变了，老版 TP 可能连不上，建议加上这一行兼容旧密码加密方式
      command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  nginx:
    image: nginx:latest
    container_name: car_nginx
    ports:
      - "8080:80"
    volumes:
      - ./houtai:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

volumes:
  mysql_data:


# 第一次运行命令：docker-compose up -d --build  停止：docker-compose stop 停止加删除容器：docker-compose down（不要随便加-v，会删除数据库） 再次启动：docker-compose start
# 特殊情况：什么时候需要再次使用 up？
# 虽然日常用 start 就够了，但在以下情况，你需要再次运行 docker-compose up -d：
# 修改了 docker-compose.yml 文件：
# 比如你改了端口映射、增加了环境变量、或者修改了挂载路径。
# 命令：docker-compose up -d (Docker 会检测到配置变化，自动重建受影响的容器)。
# 修改了 Dockerfile 文件：
# 比如你想安装一个新的 PHP 扩展。
# 命令：docker-compose up -d --build (强制重新构建镜像)。
# 如果你不小心用了 down 命令：
# 容器被删除了，必须用 up 重新创建。
# 命令：docker-compose up -d (数据卷里的数据通常还在，数据库不会丢)。