<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, location=no ">
    <style>
      /* 解决不同设备背景颜色不一致问题 */
      html, body {
        background-color: #fff;
      }
      #app {
        background-color: #fff;
      }
      .woot-widget-bubble{
        bottom:100px !important;
      }

    </style>
    <!-- <meta name='apple-mobile-web-app-capable' content='yes' />
    <meta name='full-screen' content='true' />
    <meta name='x5-fullscreen' content='true' />
    <meta name='360-fullscreen' content='true' /> -->
    <!-- <link rel="icon" href="<%= BASE_URL %>favicon.ico"> -->
    <title><%= htmlWebpackPlugin.options.title %></title>
    <script src="/config.js"></script>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->

    <script>
      (function(d,t) {
        var BASE_URL="https://app.jdwe.live";
        var g=d.createElement(t),s=d.getElementsByTagName(t)[0];
        g.src=BASE_URL+"/packs/js/sdk.js";
        g.defer = true;
        g.async = true;
        s.parentNode.insertBefore(g,s);
        g.onload=function(){
          window.chatwootSDK.run({
            websiteToken: 'XFFx6yNqEQWp2nNrysY9e1Pi',
            baseUrl: BASE_URL
          })
            // 设置用户信息，如果localStorage中有userinfo
          const userinfoStr = localStorage.getItem('userinfo');
          if (userinfoStr) {
            const userinfo = JSON.parse(userinfoStr);
            window.$chatwoot.setUser(userinfo.id, {
                  name: userinfo.username || '',
                  phone_number: userinfo.tel || ''
                });
          }     
        }
      })(document,"script");
      
        
    </script>
    
  </body>
</html>
